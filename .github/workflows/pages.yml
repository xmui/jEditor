name: Deploy PWA to GitHub Pages

# Hosts the app/ folder at https://<owner>.github.io/<repo>/ on every push
# to the default branch. Once live, Chrome/Edge show an Install icon in the
# address bar — installing gives a standalone desktop app with offline
# support (service worker precaches all assets).
#
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deployment
        uses: actions/deploy-pages@v4
