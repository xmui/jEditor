name: Release

# Publishes a GitHub Release with standalone.html attached.
# Fires automatically when a version bump (app/version.js or package.json)
# lands on the default branch — no manual tagging needed. The version tag
# is created for you. Can also be run any time from the Actions tab.
on:
  push:
    branches: [main]
    paths:
      - 'app/version.js'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build standalone.html
        if: steps.exists.outputs.exists == 'false'
        run: node scripts/build-standalone.js

      - name: Publish release
        if: steps.exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: jEditor v${{ steps.version.outputs.version }}
          files: standalone.html
          generate_release_notes: true
